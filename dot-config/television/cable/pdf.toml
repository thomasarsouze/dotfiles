[metadata]
name = "pdf"
description = "Browse PDF files"
requirements = ["fd", "pdftotext", "realpath"]

[source]
command = [
  "fd -t f -e pdf --absolute-path . ",
  "fd -t f -e pdf -H --absolute-path . ",
]

[preview]
command = "pdftotext -l 2 -layout '{}' - 2>/dev/null | head -200 || file '{}'"

[ui]
layout = "portrait"

[keybindings]
enter = "actions:open"
ctrl-c = "actions:copypath"

[actions.open]
description = "Open the selected PDF with default viewer"
command = "xdg-open '{}' 2>/dev/null || open '{}'"
mode = "fork"

[actions.copypath]
description = "Copy the path of the selected PDF to clipboard"
command = "echo -n '{}' | pbcopy"
mode = "fork"
