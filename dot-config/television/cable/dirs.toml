[metadata]
name = "dirs"
description = "A channel to select from directories"
requirements = ["fd", "eza"]

[source]
command = ["fd -t d", "fd -t d --hidden"]

[preview]
command = "eza -la --color=always '{}'"

[keybindings]
shortcut = "f2"
enter = "actions:tmux"
backtab = "actions:goto_parent_dir"
ctrl-c = "actions:cd"
ctrl-e = "actions:edit"

[actions.cd]
description = "Open a shell in the selected directory"
command = "cd '{}' && $SHELL"
mode = "execute"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv dirs .."
mode = "execute"

[actions.edit]
description = "Open the repository in editor"
command = "${EDITOR:-vim} '{}'"
shell = "bash"
mode = "execute"

[actions.tmux]
description = "Open directory in tmux (shell + nvim)"
command = """
selected_name=$((basename $(dirname '{}')_$(basename '{}')) | tr . _)
tmux_running=$(pgrep tmux)
if [[ -z $TMUX ]] && [[ -z $tmux_running ]]; then
  tmux new-session -s $selected_name -c '{}' -d                     # create new session and detach
  tmux new-window -t "$selected_name" -n 'editor' -c '{}' nvim      # create new window for nvim
  tmux select-window -t "$selected_name:0"                               # select the shell window
  tmux attach-session -t "$selected_name"                                # attach to the session
  exit 0
fi

if ! tmux has-session -t=$selected_name 2>/dev/null; then
  tmux new-session -ds $selected_name -c '{}'
  tmux new-window -t "$selected_name" -n 'editor' -c '{}' nvim
fi

if [[ -z $TMUX ]]; then
  tmux attach-session -t $selected_name
else
  tmux switch-client -t $selected_name
fi

"""
mode = "execute"
