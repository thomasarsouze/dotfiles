[metadata]
name = "git-repos"
requirements = ["fd", "git"]
description = """
A channel to select from git repositories on your local machine.

This channel uses `fd` to find directories that contain a `.git` subdirectory, and then allows you to preview the git log of the selected repository.
"""

[source]
# this is a macos version of the command. While perfectly usable on linux, you may want to tweak it a bit.
command = [
  "fd -g .git -HL -t d -d 10 --prune ~/Documents/Modeles/ --exec dirname '{}'",
  "fd -g .git -HL -t d -d 10 --prune ~ -E 'Library' -E 'Application Support' --exec dirname '{}'",
]
#display = "{split:/:-1}"

[preview]
command = "cd '{}'; git log -n 200 --pretty=medium --all --graph --color"
header = "Repo: '{}'"

[keybindings]
enter = "actions:tmux"
ctrl-c = "actions:cd"
ctrl-e = "actions:edit"

[actions.cd]
description = "Open a new shell in the selected repository"
command = "cd '{}' && $SHELL"
mode = "execute"

[actions.edit]
description = "Open the repository in editor"
command = "${EDITOR:-vim} '{}'"
shell = "bash"
mode = "execute"

[actions.tmux]
description = "Open repo in tmux (shell + nvim)"
command = """
selected_name=$((basename $(dirname '{}')_$(basename '{}')) | tr . _)
tmux_running=$(pgrep tmux)
if [[ -z $TMUX ]] && [[ -z $tmux_running ]]; then
  tmux new-session -s $selected_name -c '{}' -d                     # create new session and detach
  tmux new-window -t "$selected_name:" -n 'editor' -c "'{}'" 'nvim' # create new window for nvim
  tmux select-window -t "$selected_name:0"                               # select the shell window
  tmux attach-session -t "$selected_name"                                # attach to the session
  exit 0
fi

if ! tmux has-session -t=$selected_name 2>/dev/null; then
  tmux new-session -ds $selected_name -c '{}'
  tmux new-window -t "$selected_name:" -n 'editor' -c "'{}'" 'nvim'
fi

if [[ -z $TMUX ]]; then
  tmux attach-session -t $selected_name
else
  tmux switch-client -t $selected_name
fi

"""
mode = "execute"
