[metadata]
name = "env"
description = "A channel to select from environment variables"

[source]
command = "printenv"
output = "{cut -d: -f1}"

[preview]
command = "echo '{split:=:1..}' | tr ':' '\n' | fold -w 100"

[ui]
layout = "landscape"
preview_panel = { size = 50, header = "{split:=:0}" }

[keybindings]
shortcut = "f3"

[actions.name]
description = "Output the variable name instead of the value"
command = "echo '{split:=:0}'"
mode = "execute"
