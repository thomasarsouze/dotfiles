[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd", "bat", "copypath", "copyfile"]

[source]
[[source.command]]
name = "Default"
run = "fd -t f"

[[source.command]]
name = "Hidden"
run = "fd -t f -H"

[[source.command]]
name = "Hidden + no-ignore"
run = "fd -t f -H -I"

[preview]
command = "bat -n --color=always '{}'"
env = { BAT_THEME = "ansi" }

[keybindings]
shortcut = "f1"
enter = "actions:edit"
ctrl-up = "actions:goto_parent_dir"
ctrl-shift-P = "actions:copy_path"
ctrl-shift-F = "actions:copy_file"

[actions.edit]
description = "Opens the selected entries with the default editor (falls back to vim)"
command = "nvim '{}'"
shell = "zsh"
# use `mode = "fork"` if you want to return to tv afterwards
mode = "execute"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv files .."
mode = "execute"

[actions.copy_path]
description = "Copies the path of the selected entry to the clipboard"
command = "zsh -ic 'copypath {}'"
mode = "execute"

[actions.copy_file]
description = "Copies the content of the selected entry to the clipboard"
command = "zsh -ic 'copyfile {}'"
mode = "execute"

[ui.preview_panel]
hidden = false
